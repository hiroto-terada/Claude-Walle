<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海の宝探し 🌊</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #00111f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 10px;
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

#game-wrapper {
  width: 100%;
  max-width: 900px;
}

/* HUD */
#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: rgba(0, 20, 50, 0.97);
  border: 2px solid #0077bb;
  border-bottom: none;
  border-radius: 14px 14px 0 0;
  color: white;
  gap: 10px;
  flex-wrap: wrap;
}

#target-panel {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}

.target-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 5px 10px;
  border-radius: 10px;
  background: rgba(0, 60, 130, 0.45);
  border: 2px solid #0066aa;
  font-size: 12px;
  min-width: 72px;
  transition: all 0.35s ease;
}

.target-card.found {
  background: rgba(0, 150, 70, 0.4);
  border-color: #00cc66;
}

.target-card.found .card-name,
.target-card.found .card-pts,
.target-card.found .card-diff {
  text-decoration: line-through;
  opacity: 0.6;
}

.card-thumb { display: block; width: 44px; height: 44px; }
.card-name { font-weight: bold; font-size: 11px; margin-top: 2px; }
.card-pts  { color: #ffcc00; font-size: 13px; font-weight: bold; }
.card-diff { font-size: 10px; color: #99aacc; }

#timer-box {
  text-align: center;
  min-width: 74px;
}
#timer-label { font-size: 10px; color: #99aacc; letter-spacing: 1px; }
#timer-val {
  font-size: 34px;
  font-weight: 900;
  color: #ffcc00;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
#timer-val.urgent {
  color: #ff4444;
  animation: blink 0.5s infinite alternate;
}
@keyframes blink { from { opacity: 1; } to { opacity: 0.35; } }

#score-box {
  text-align: right;
  min-width: 80px;
}
#score-label { font-size: 10px; color: #99aacc; letter-spacing: 1px; }
#score-val {
  font-size: 30px;
  font-weight: 900;
  color: #00ffcc;
  line-height: 1;
}

/* Canvas */
#canvas-container {
  position: relative;
  width: 100%;
  overflow: hidden;
  border: 2px solid #0077bb;
  border-radius: 0 0 14px 14px;
  background: #001428;
  line-height: 0;
}

canvas {
  display: block;
  width: 100%;
  height: auto;
  cursor: crosshair;
  touch-action: none;
}

/* Overlays */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0, 8, 25, 0.88);
  color: white;
  border-radius: 0 0 12px 12px;
  z-index: 20;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.overlay.hidden { display: none; }

.overlay h1 {
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  margin-bottom: 8px;
  color: #00ffcc;
  text-shadow: 0 0 30px rgba(0,255,200,0.6);
  text-align: center;
}
.overlay p {
  font-size: clamp(0.85rem, 2.5vw, 1.05rem);
  color: #aaddff;
  margin-bottom: 16px;
  text-align: center;
  max-width: 420px;
  line-height: 1.7;
}

.target-preview {
  display: flex;
  gap: 12px;
  margin: 10px 0 18px;
  flex-wrap: wrap;
  justify-content: center;
}
.preview-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 16px;
  background: rgba(0, 70, 150, 0.3);
  border: 1px solid #0066aa;
  border-radius: 12px;
  gap: 4px;
  min-width: 90px;
}
.big-thumb { display: block; width: 64px; height: 64px; }
.p-name  { font-size: 13px; font-weight: bold; }
.p-pts   { font-size: 14px; color: #ffcc00; font-weight: bold; }
.p-diff  { font-size: 11px; color: #99aacc; }

.btn {
  padding: 13px 42px;
  font-size: clamp(1rem, 3vw, 1.2rem);
  background: linear-gradient(135deg, #0055bb, #0099ff);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 18px rgba(0,120,255,0.45);
  transition: transform 0.1s, box-shadow 0.15s;
  margin: 5px;
  letter-spacing: 1px;
}
.btn:hover  { transform: scale(1.06); box-shadow: 0 6px 24px rgba(0,150,255,0.65); }
.btn:active { transform: scale(0.97); }

.result-score {
  font-size: clamp(2.5rem, 10vw, 4rem);
  font-weight: 900;
  color: #ffcc00;
  text-shadow: 0 0 20px rgba(255,200,0,0.5);
}
.result-breakdown {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: 12px 0;
  font-size: 0.95rem;
}
.result-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #aaddff;
  font-size: 1rem;
}
.result-row.found-yes { color: #00ffaa; }
.result-row.found-no  { color: #ff6666; opacity: 0.7; }
</style>
</head>
<body>
<div id="game-wrapper">

  <!-- HUD -->
  <div id="hud">
    <div id="target-panel"><!-- built by JS --></div>
    <div id="timer-box">
      <div id="timer-label">のこり時間</div>
      <div id="timer-val">60</div>
    </div>
    <div id="score-box">
      <div id="score-label">スコア</div>
      <div id="score-val">0</div>
    </div>
  </div>

  <!-- Canvas area -->
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="start-overlay">
      <h1>🌊 海の宝探し 🌊</h1>
      <p>海の中にかくれた3つのものを探してタップ！<br>60秒以内にすべて見つけると100点！</p>
      <div class="target-preview" id="start-preview"><!-- built by JS --></div>
      <button class="btn" onclick="startGame()">ゲームスタート！</button>
    </div>

    <!-- End overlay -->
    <div class="overlay hidden" id="end-overlay">
      <h1 id="end-title"></h1>
      <div class="result-score" id="result-score"></div>
      <div class="result-breakdown" id="result-breakdown"></div>
      <button class="btn" onclick="showStartOverlay()">もう一度！</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const W = 900;
const H = 630;
canvas.width  = W;
canvas.height = H;

const SAND_Y  = Math.floor(H * 0.79);
const WATER_Y = 0;

// ─────────────────────────────────────────────
//  CREATURE POOL  (6 types, 3 picked per game)
// ─────────────────────────────────────────────
const CREATURE_POOL = [
  { id:'clownfish', name:'クマノミ',       pts:20, diff:'易しい', zone:'water',  hitR:28 },
  { id:'starfish',  name:'ヒトデ',         pts:25, diff:'易しい', zone:'sand',   hitR:22 },
  { id:'octopus',   name:'タコ',           pts:30, diff:'ふつう', zone:'bottom', hitR:32 },
  { id:'crab',      name:'カニ',           pts:35, diff:'ふつう', zone:'sand',   hitR:22 },
  { id:'seahorse',  name:'タツノオトシゴ', pts:40, diff:'難しい', zone:'water',  hitR:18 },
  { id:'chest',     name:'宝箱',           pts:50, diff:'難しい', zone:'sand',   hitR:22 },
];

// Scale/offset for centering each creature in thumbnail canvases (base 44×44)
const THUMB_CFG = {
  clownfish: { s: 0.68, dy:  0 },
  starfish:  { s: 0.95, dy:  0 },
  octopus:   { s: 0.28, dy:  4 },
  crab:      { s: 0.52, dy:  6 },
  seahorse:  { s: 0.42, dy:  6 },
  chest:     { s: 0.90, dy:  4 },
};

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let gameActive    = false;
let score         = 0;
let timeLeft      = 60;
let timerInterval = null;
let gameTargets   = [];   // [{ ...creature, x, y, found }]
let feedbacks     = [];
let ripples       = [];

// ─────────────────────────────────────────────
//  SCENE OBJECTS
// ─────────────────────────────────────────────
let seaweeds  = [];
let rocks     = [];
let distFish  = [];
let bubbles   = [];
let jellyfish = [];

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function rnd(min, max) { return min + Math.random() * (max - min); }
function rndInt(min, max) { return Math.floor(rnd(min, max)); }
function dist2(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return dx * dx + dy * dy;
}

function pickRandom3() {
  const pool = [...CREATURE_POOL];
  const picked = [];
  while (picked.length < 3) {
    const i = rndInt(0, pool.length);
    picked.push({ ...pool[i] });
    pool.splice(i, 1);
  }
  return picked;
}

// ─────────────────────────────────────────────
//  SCENE INIT
// ─────────────────────────────────────────────
function initScene() {
  // Seaweeds
  seaweeds = [];
  const swColors = ['#1a8a3a','#2aaa4a','#1a6a2a','#0a7a30','#3aba5a','#228b22','#006400'];
  for (let i = 0; i < 42; i++) {
    seaweeds.push({
      x:       rnd(10, W - 10),
      baseY:   SAND_Y + rnd(2, 14),
      height:  rnd(35, 110),
      segs:    rndInt(4, 8),
      speed:   rnd(0.4, 0.9),
      phase:   rnd(0, Math.PI * 2),
      sway:    rnd(8, 18),
      width:   rnd(2.5, 5),
      color:   swColors[rndInt(0, swColors.length)]
    });
  }

  // Rocks
  rocks = [];
  for (let i = 0; i < 28; i++) {
    const g = rndInt(55, 115);
    rocks.push({
      x:     rnd(15, W - 15),
      y:     SAND_Y + rnd(3, 30),
      rx:    rnd(12, 50),
      ry:    rnd(7, 22),
      angle: rnd(0, Math.PI),
      color: `rgb(${g},${g},${g + rndInt(5, 20)})`
    });
  }
  for (let i = 0; i < 6; i++) {
    const g = rndInt(50, 80);
    rocks.push({
      x:     rnd(15, W - 15),
      y:     SAND_Y + rnd(2, 20),
      rx:    rnd(16, 26),
      ry:    rnd(9, 14),
      angle: rnd(-0.3, 0.3),
      color: `rgb(${g},${g - 10},${g - 15})`
    });
  }

  // Distractor fish
  distFish = [];
  const palettes = [
    ['#FF9966','#FF6633','#FFB399'],
    ['#66AAFF','#3388EE','#99CCFF'],
    ['#77FF99','#33CC66','#AAFFCC'],
    ['#FF77BB','#EE3388','#FFAACC'],
    ['#FFEE55','#CCBB00','#FFFF99'],
    ['#CC88FF','#9944EE','#DDB8FF'],
    ['#55DDDD','#00AAAA','#88EEEE'],
    ['#FFAA44','#CC6611','#FFCC88'],
    ['#DD4444','#AA1111','#FF8888'],
    ['#44DDAA','#119966','#88FFCC'],
  ];
  for (let i = 0; i < 28; i++) {
    const pal = palettes[rndInt(0, palettes.length)];
    const dir = Math.random() < 0.5 ? 1 : -1;
    distFish.push({
      x:        rnd(0, W),
      y:        rnd(WATER_Y + 30, SAND_Y - 40),
      size:     rnd(11, 21),
      color:    pal[0],
      tailCol:  pal[1],
      finCol:   pal[2],
      stripe:   Math.random() < 0.25 ? 'rgba(255,255,255,0.35)' : null,
      speed:    rnd(0.25, 0.9) * dir,
      bobSpd:   rnd(0.7, 1.6),
      bobPhase: rnd(0, Math.PI * 2),
      bobAmt:   rnd(2, 6),
      dir
    });
  }

  // Jellyfish
  jellyfish = [];
  const jfPals = [
    { inner:'rgba(255,140,200,0.85)', outer:'rgba(200,50,160,0.45)',  tent:'rgba(200,90,180,0.65)' },
    { inner:'rgba(130,190,255,0.85)', outer:'rgba(40,100,210,0.45)',  tent:'rgba(90,140,255,0.65)' },
    { inner:'rgba(160,255,190,0.85)', outer:'rgba(40,180,100,0.45)', tent:'rgba(80,200,140,0.65)' },
  ];
  for (let i = 0; i < 7; i++) {
    const p = jfPals[i % jfPals.length];
    jellyfish.push({
      x:          rnd(40, W - 40),
      y:          rnd(WATER_Y + 20, SAND_Y * 0.55),
      size:       rnd(16, 30),
      pulseSpd:   rnd(1.3, 2.2),
      pulsePhase: rnd(0, Math.PI * 2),
      driftSpd:   rnd(0.04, 0.14) * (Math.random() < 0.5 ? 1 : -1),
      ...p
    });
  }

  // Bubbles
  bubbles = [];
  for (let i = 0; i < 35; i++) bubbles.push(makeBubble());

  // Place targets
  placeTargets();
}

function makeBubble() {
  return {
    x:     rnd(0, W),
    y:     rnd(WATER_Y + 10, SAND_Y - 10),
    r:     rnd(1.5, 5.5),
    spd:   rnd(0.25, 0.7),
    drift: rnd(-0.2, 0.2),
    alpha: rnd(0.2, 0.55)
  };
}

function placeTargets() {
  for (const gt of gameTargets) {
    switch (gt.zone) {
      case 'water':
        gt.x = rnd(80, W - 80);
        gt.y = rnd(WATER_Y + 70, SAND_Y - 120);
        break;
      case 'bottom':
        gt.x = rnd(80, W - 80);
        gt.y = rnd(SAND_Y - 85, SAND_Y - 35);
        break;
      case 'sand':
        gt.x = rnd(80, W - 80);
        gt.y = SAND_Y + rnd(6, 18);
        break;
    }
  }
  // Enforce minimum separation
  const minD2 = 130 * 130;
  for (let iter = 0; iter < 10; iter++) {
    for (let a = 0; a < gameTargets.length; a++) {
      for (let b = a + 1; b < gameTargets.length; b++) {
        const ga = gameTargets[a], gb = gameTargets[b];
        if (dist2(ga.x, ga.y, gb.x, gb.y) < minD2) {
          gb.x = Math.max(60, Math.min(W - 60, gb.x + 50));
        }
      }
    }
  }
}

// ─────────────────────────────────────────────
//  DECORATIVE DRAW  (use global ctx)
// ─────────────────────────────────────────────
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#001a3a');
  g.addColorStop(0.35,'#002860');
  g.addColorStop(0.72,'#003270');
  g.addColorStop(1,   '#001628');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Light rays
  ctx.save();
  ctx.globalAlpha = 0.035;
  for (let i = 0; i < 9; i++) {
    const rx = W * 0.08 + i * W * 0.105;
    ctx.beginPath();
    ctx.moveTo(rx - 18, 0);
    ctx.lineTo(rx + 18, 0);
    ctx.lineTo(rx + 100 + i * 18, SAND_Y);
    ctx.lineTo(rx - 100 - i * 18, SAND_Y);
    ctx.closePath();
    ctx.fillStyle = '#88ccff';
    ctx.fill();
  }
  ctx.restore();

  // Sand
  const t = performance.now() * 0.0004;
  const sg = ctx.createLinearGradient(0, SAND_Y, 0, H);
  sg.addColorStop(0, '#c9a96e');
  sg.addColorStop(1, '#a07840');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, SAND_Y + Math.sin(t) * 4);
  for (let x = 0; x <= W; x += 25) {
    ctx.lineTo(x, SAND_Y + Math.sin(x * 0.045 + t) * 5);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#7a5a20';
  for (let i = 0; i < 180; i++) {
    const sx = (i * 139.7) % W;
    const sy = SAND_Y + 3 + ((i * 67.3) % (H - SAND_Y - 3));
    ctx.beginPath();
    ctx.arc(sx, sy, 1.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawRock(r) {
  ctx.save();
  ctx.translate(r.x, r.y);
  ctx.rotate(r.angle);
  ctx.beginPath();
  ctx.ellipse(0, 0, r.rx, r.ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = r.color;
  ctx.fill();
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(-r.rx * 0.22, -r.ry * 0.25, r.rx * 0.48, r.ry * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.restore();
}

function drawSeaweed(sw) {
  const t = performance.now() * 0.001;
  const sway = Math.sin(t * sw.speed + sw.phase) * sw.sway;
  ctx.save();
  ctx.strokeStyle = sw.color;
  ctx.lineWidth   = sw.width;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  const segH = sw.height / sw.segs;
  ctx.beginPath();
  ctx.moveTo(sw.x, sw.baseY);
  for (let i = 1; i <= sw.segs; i++) {
    const ratio = i / sw.segs;
    const sx  = sw.x + sway * ratio * ratio;
    const sy  = sw.baseY - segH * i;
    const cpx = sw.x + sway * ratio * ratio * 0.7;
    const cpy = sw.baseY - segH * (i - 0.5);
    ctx.quadraticCurveTo(cpx, cpy, sx, sy);
  }
  ctx.stroke();

  ctx.save();
  ctx.globalAlpha = 0.65;
  ctx.fillStyle = sw.color;
  for (let i = 1; i < sw.segs; i++) {
    const ratio = i / sw.segs;
    const sx   = sw.x + sway * ratio * ratio;
    const sy   = sw.baseY - segH * i;
    const side = i % 2 === 0 ? 1 : -1;
    ctx.beginPath();
    ctx.ellipse(sx + side * sw.width * 2.2, sy,
                sw.width * 2.4, sw.width * 1.1,
                side * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  ctx.restore();
}

function drawFish(f) {
  const t   = performance.now() * 0.001;
  const bob = Math.sin(t * f.bobSpd + f.bobPhase) * f.bobAmt;
  const x   = f.x;
  const y   = f.y + bob;
  const s   = f.size;

  ctx.save();
  ctx.translate(x, y);
  if (f.dir < 0) ctx.scale(-1, 1);

  ctx.beginPath();
  ctx.ellipse(0, 0, s, s * 0.58, 0, 0, Math.PI * 2);
  ctx.fillStyle = f.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-s * 0.78, 0);
  ctx.lineTo(-s * 1.38, -s * 0.52);
  ctx.lineTo(-s * 1.38,  s * 0.52);
  ctx.closePath();
  ctx.fillStyle = f.tailCol;
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-s * 0.1, -s * 0.58);
  ctx.lineTo( s * 0.28, -s * 0.92);
  ctx.lineTo( s * 0.52, -s * 0.58);
  ctx.closePath();
  ctx.fillStyle = f.finCol;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(s * 0.42, -s * 0.1, s * 0.13, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.44, -s * 0.1, s * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();

  if (f.stripe) {
    ctx.strokeStyle = f.stripe;
    ctx.lineWidth   = s * 0.11;
    ctx.beginPath();
    ctx.moveTo(s * 0.13, -s * 0.58);
    ctx.lineTo(s * 0.13,  s * 0.58);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBubble(b) {
  ctx.save();
  ctx.globalAlpha = b.alpha;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(140, 210, 255, 0.85)';
  ctx.lineWidth   = 0.9;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
  ctx.restore();
}

function drawJellyfish(jf) {
  const t     = performance.now() * 0.001;
  const pulse = Math.sin(t * jf.pulseSpd + jf.pulsePhase);
  const bw    = jf.size * (1 + pulse * 0.14);
  const bh    = jf.size * 0.6 * (1 - pulse * 0.12);

  ctx.save();
  ctx.translate(jf.x, jf.y);
  ctx.globalAlpha = 0.72;

  const bg = ctx.createRadialGradient(0, -bh * 0.3, 0, 0, 0, bw);
  bg.addColorStop(0, jf.inner);
  bg.addColorStop(1, jf.outer);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.ellipse(0, 0, bw, bh, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  for (let i = 0; i < 6; i++) {
    const tx   = (-0.5 + i / 5) * bw;
    const wave = Math.sin(t * 1.6 + i + jf.pulsePhase) * 10;
    ctx.beginPath();
    ctx.moveTo(tx, bh * 0.8);
    ctx.bezierCurveTo(tx + wave, bh * 1.6, tx - wave, bh * 2.1, tx + wave * 0.5, bh * 3.2);
    ctx.strokeStyle = jf.tent;
    ctx.lineWidth   = 1.4;
    ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  TARGET CREATURE DRAW FUNCTIONS  (c, x, y, t, found)
//  These accept any canvas context so thumbnails can reuse them.
// ─────────────────────────────────────────────
function roundRect(c, x, y, w, h, r) {
  if (typeof r === 'number') r = [r, r, r, r];
  const [tl, tr, br, bl] = r;
  c.beginPath();
  c.moveTo(x + tl, y);
  c.lineTo(x + w - tr, y);
  c.quadraticCurveTo(x + w, y, x + w, y + tr);
  c.lineTo(x + w, y + h - br);
  c.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
  c.lineTo(x + bl, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - bl);
  c.lineTo(x, y + tl);
  c.quadraticCurveTo(x, y, x + tl, y);
  c.closePath();
}

function drawFoundRing(c, x, y, r, t) {
  const pulse = (Math.sin(t * 5) + 1) / 2;
  c.save();
  c.strokeStyle = `rgba(0, 255, 140, ${0.5 + pulse * 0.45})`;
  c.lineWidth   = 3;
  c.setLineDash([7, 5]);
  c.beginPath();
  c.arc(x, y, r + 4 + pulse * 6, 0, Math.PI * 2);
  c.stroke();
  c.setLineDash([]);
  c.restore();
}

function drawClownfish(c, x, y, t, foundFlag) {
  const s        = 26;
  const finWave  = Math.sin(t * 6) * 0.08;
  c.save();
  c.translate(x, y);

  // Body
  c.beginPath();
  c.ellipse(0, 0, s, s * 0.6, 0, 0, Math.PI * 2);
  c.fillStyle = '#FF6820';
  c.fill();
  c.strokeStyle = '#BB3300';
  c.lineWidth   = 1.8;
  c.stroke();

  // White bands
  c.fillStyle   = 'white';
  c.strokeStyle = '#BB3300';
  c.lineWidth   = 0.9;
  for (const bx of [s * 0.22, -s * 0.22]) {
    c.beginPath();
    c.ellipse(bx, 0, s * 0.115, s * 0.61, 0, 0, Math.PI * 2);
    c.fill();
    c.stroke();
  }

  // Tail
  c.beginPath();
  c.moveTo(-s * 0.78, 0);
  c.lineTo(-s * 1.38, -s * 0.55);
  c.lineTo(-s * 1.38,  s * 0.55);
  c.closePath();
  c.fillStyle   = '#FF6820';
  c.fill();
  c.strokeStyle = '#BB3300';
  c.stroke();

  // Dorsal fin (slight waggle)
  c.save();
  c.rotate(finWave);
  c.beginPath();
  c.moveTo(-s * 0.05, -s * 0.6);
  c.lineTo( s * 0.3,  -s * 0.95);
  c.lineTo( s * 0.55, -s * 0.6);
  c.closePath();
  c.fillStyle   = '#FF8844';
  c.fill();
  c.strokeStyle = '#BB3300';
  c.stroke();
  c.restore();

  // Eye
  c.beginPath();
  c.arc(s * 0.5, -s * 0.1, s * 0.15, 0, Math.PI * 2);
  c.fillStyle = 'white';
  c.fill();
  c.beginPath();
  c.arc(s * 0.52, -s * 0.1, s * 0.08, 0, Math.PI * 2);
  c.fillStyle = '#111';
  c.fill();

  c.restore();
  if (foundFlag) drawFoundRing(c, x, y, s + 12, t);
}

function drawOctopus(c, x, y, t, foundFlag) {
  const hr = 24;
  c.save();
  c.translate(x, y);

  // Tentacles (8)
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + Math.PI * 0.5;
    const wave  = Math.sin(t * 2.1 + i * 0.85) * 9;
    const bx    = Math.cos(angle) * hr * 0.55;
    const by    = Math.sin(angle) * hr * 0.5;
    const ex    = Math.cos(angle) * hr * 3.1 + wave;
    const ey    = Math.sin(angle) * hr * 2.7;
    c.beginPath();
    c.moveTo(bx, by);
    c.bezierCurveTo(
      bx + wave * 0.6, by + (ey - by) * 0.4,
      ex - wave * 0.4, by + (ey - by) * 0.7,
      ex, ey
    );
    c.strokeStyle = '#6a3a90';
    c.lineWidth   = 4.5;
    c.lineCap     = 'round';
    c.stroke();
    c.beginPath();
    c.arc(bx + (ex - bx) * 0.65 + wave * 0.4,
          by + (ey - by) * 0.65, 2.8, 0, Math.PI * 2);
    c.fillStyle = '#cc99ee';
    c.fill();
  }

  // Head
  c.beginPath();
  c.ellipse(0, 0, hr, hr * 1.12, 0, 0, Math.PI * 2);
  c.fillStyle = '#9b5fbf';
  c.fill();
  c.strokeStyle = '#6a3a90';
  c.lineWidth   = 2;
  c.stroke();

  c.globalAlpha = 0.28;
  c.fillStyle   = '#fff';
  for (const [sx, sy] of [[-8,-6],[5,-9],[10,3],[-4,7],[0,-1]]) {
    c.beginPath();
    c.arc(sx, sy, 2.8, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;

  // Eyes
  for (const ex of [-hr * 0.38, hr * 0.38]) {
    c.beginPath();
    c.arc(ex, -hr * 0.18, 6.5, 0, Math.PI * 2);
    c.fillStyle = '#ffe56a';
    c.fill();
    c.beginPath();
    c.arc(ex + 1, -hr * 0.18, 3.5, 0, Math.PI * 2);
    c.fillStyle = '#222';
    c.fill();
  }

  c.restore();
  if (foundFlag) drawFoundRing(c, x, y, hr + 14, t);
}

function drawChest(c, x, y, t, foundFlag) {
  const w      = 34, h = 26;
  const buried = h * 0.38;

  c.save();
  c.translate(x, y);

  // Body
  c.beginPath();
  roundRect(c, -w / 2, -h / 2 + buried * 0.3, w, h - buried + 4, 3);
  c.fillStyle = '#7a4e20';
  c.fill();
  c.strokeStyle = '#4a2a08';
  c.lineWidth   = 1.8;
  c.stroke();

  // Lid
  c.save();
  c.rotate(-0.18);
  c.beginPath();
  roundRect(c, -w / 2, -h / 2 - h * 0.38, w, h * 0.48, [3, 3, 0, 0]);
  c.fillStyle   = '#9a6230';
  c.fill();
  c.strokeStyle = '#4a2a08';
  c.stroke();
  c.restore();

  // Metal bands
  c.strokeStyle = '#c89800';
  c.lineWidth   = 2.5;
  for (const bx of [-w * 0.26, 0, w * 0.26]) {
    c.beginPath();
    c.moveTo(bx, -h / 2 + buried * 0.3);
    c.lineTo(bx,  h / 2 - buried + 4);
    c.stroke();
  }

  // Lock
  c.fillStyle   = '#ffd700';
  c.strokeStyle = '#b89000';
  c.lineWidth   = 1.2;
  c.beginPath();
  c.arc(0, -h * 0.06, 5, 0, Math.PI * 2);
  c.fill(); c.stroke();

  // Glow hint (shown until found)
  if (!foundFlag) {
    c.save();
    c.globalAlpha = 0.22;
    const gl = c.createRadialGradient(0, -h * 0.4, 0, 0, -h * 0.4, w * 0.7);
    gl.addColorStop(0, '#ffdd44');
    gl.addColorStop(1, 'transparent');
    c.fillStyle = gl;
    c.beginPath();
    c.arc(0, -h * 0.4, w * 0.7, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  c.restore();
  if (foundFlag) drawFoundRing(c, x, y - 4, 26, t);
}

function drawStarfish(c, x, y, t, foundFlag) {
  const s   = 20;
  const rot = t * 0.25;
  c.save();
  c.translate(x, y);
  c.rotate(rot);

  // 5-pointed star
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const oa = (i / 5) * Math.PI * 2 - Math.PI / 2;
    const ia = oa + Math.PI / 5;
    const ox = Math.cos(oa) * s,       oy = Math.sin(oa) * s;
    const ix = Math.cos(ia) * s * 0.42, iy = Math.sin(ia) * s * 0.42;
    if (i === 0) c.moveTo(ox, oy); else c.lineTo(ox, oy);
    c.lineTo(ix, iy);
  }
  c.closePath();
  c.fillStyle = '#e8632a';
  c.fill();
  c.strokeStyle = '#c04010';
  c.lineWidth = 1.5;
  c.stroke();

  // Arm texture dots
  c.fillStyle   = '#ff9966';
  c.globalAlpha = 0.6;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
    c.beginPath();
    c.arc(Math.cos(a) * s * 0.55, Math.sin(a) * s * 0.55, 2.8, 0, Math.PI * 2);
    c.fill();
  }
  c.globalAlpha = 1;

  // Center disc
  c.beginPath();
  c.arc(0, 0, s * 0.28, 0, Math.PI * 2);
  c.fillStyle = '#ff7744';
  c.fill();

  c.restore();
  if (foundFlag) drawFoundRing(c, x, y, s + 8, t);
}

function drawCrab(c, x, y, t, foundFlag) {
  const w = 22;
  c.save();
  c.translate(x, y);

  // Legs (3 each side, drawn behind body)
  for (const side of [-1, 1]) {
    for (let i = 0; i < 3; i++) {
      const legWave = Math.sin(t * 5 + i * 0.9) * 3 * side;
      c.beginPath();
      c.moveTo(side * w * 0.45, -w * 0.15 + i * w * 0.32);
      c.lineTo(side * w * 0.9 + legWave * 1.8, -w * 0.15 + i * w * 0.32 + w * 0.38);
      c.strokeStyle = '#bb2f0e';
      c.lineWidth   = 2.8;
      c.lineCap     = 'round';
      c.stroke();
    }
  }

  // Claws
  for (const side of [-1, 1]) {
    const clawWave = Math.sin(t * 2.5) * 0.12 * side;
    c.save();
    c.translate(side * w * 0.9, -w * 0.1);
    c.rotate(clawWave);
    c.beginPath();
    c.moveTo(0, 0);
    c.lineTo(side * w * 0.85, -w * 0.38);
    c.strokeStyle = '#cc3310';
    c.lineWidth   = 5.5;
    c.lineCap     = 'round';
    c.stroke();
    c.beginPath();
    c.ellipse(side * w * 0.85, -w * 0.38, 8, 6, side * 0.4, 0, Math.PI * 2);
    c.fillStyle   = '#dd4422';
    c.fill();
    c.strokeStyle = '#991100';
    c.lineWidth   = 1.5;
    c.stroke();
    c.restore();
  }

  // Body
  c.beginPath();
  c.ellipse(0, 0, w, w * 0.65, 0, 0, Math.PI * 2);
  c.fillStyle = '#cc3310';
  c.fill();
  c.strokeStyle = '#991100';
  c.lineWidth   = 1.8;
  c.stroke();

  // Shell rings
  c.strokeStyle = 'rgba(0,0,0,0.15)';
  c.lineWidth = 1;
  c.beginPath(); c.ellipse(0, 0, w * 0.6, w * 0.42, 0, 0, Math.PI * 2); c.stroke();
  c.beginPath(); c.ellipse(0, 0, w * 0.25, w * 0.2, 0, 0, Math.PI * 2); c.stroke();

  // Eye stalks + eyes
  for (const side of [-1, 1]) {
    c.beginPath();
    c.moveTo(side * w * 0.28, -w * 0.65);
    c.lineTo(side * w * 0.36, -w * 0.92);
    c.strokeStyle = '#991100';
    c.lineWidth   = 2.2;
    c.stroke();
    c.beginPath();
    c.arc(side * w * 0.36, -w * 0.92, 4.5, 0, Math.PI * 2);
    c.fillStyle = 'white';
    c.fill();
    c.beginPath();
    c.arc(side * w * 0.37, -w * 0.92, 2.5, 0, Math.PI * 2);
    c.fillStyle = '#111';
    c.fill();
  }

  c.restore();
  if (foundFlag) drawFoundRing(c, x, y, w + 10, t);
}

function drawSeahorse(c, x, y, t, foundFlag) {
  const s    = 16;
  const sway = Math.sin(t * 1.8) * 3;
  c.save();
  c.translate(x + sway, y);

  // Tail curl
  c.beginPath();
  c.moveTo(s * 0.1, s * 1.0);
  c.bezierCurveTo(
    s * 0.9, s * 1.7,
    s * 1.0, s * 2.4,
    s * 0.1, s * 2.8
  );
  c.strokeStyle = '#c89820';
  c.lineWidth   = 7;
  c.lineCap     = 'round';
  c.lineJoin    = 'round';
  c.stroke();

  // Body
  c.beginPath();
  c.ellipse(0, s * 0.3, s * 0.52, s * 0.95, 0, 0, Math.PI * 2);
  c.fillStyle = '#e8c030';
  c.fill();
  c.strokeStyle = '#b09020';
  c.lineWidth   = 1.5;
  c.stroke();

  // Body ridges
  c.strokeStyle = '#b09020';
  c.lineWidth   = 1.2;
  for (let i = 0; i < 4; i++) {
    const ry = -s * 0.3 + i * s * 0.32;
    c.beginPath();
    c.moveTo(-s * 0.48, ry);
    c.lineTo( s * 0.48, ry);
    c.stroke();
  }

  // Dorsal fin (vibrating)
  const finWave = Math.sin(t * 9) * 3;
  c.beginPath();
  c.moveTo(-s * 0.5, -s * 0.25);
  c.bezierCurveTo(-s * 1.0 + finWave, -s * 0.55, -s * 0.95 - finWave, -s * 0.1, -s * 0.5, s * 0.2);
  c.fillStyle = 'rgba(240,195,40,0.55)';
  c.fill();

  // Neck
  c.beginPath();
  c.moveTo(-s * 0.05, -s * 0.55);
  c.lineTo(-s * 0.05, -s * 0.15);
  c.strokeStyle = '#d4a820';
  c.lineWidth   = 10;
  c.lineCap     = 'round';
  c.stroke();

  // Head
  c.beginPath();
  c.ellipse(s * 0.05, -s * 0.78, s * 0.38, s * 0.35, 0.25, 0, Math.PI * 2);
  c.fillStyle = '#e8c030';
  c.fill();
  c.strokeStyle = '#b09020';
  c.lineWidth   = 1.5;
  c.stroke();

  // Snout
  c.beginPath();
  c.moveTo(s * 0.38, -s * 0.82);
  c.lineTo(s * 1.05, -s * 0.78);
  c.strokeStyle = '#d4a820';
  c.lineWidth   = 5;
  c.lineCap     = 'round';
  c.stroke();

  // Eye
  c.beginPath();
  c.arc(s * 0.08, -s * 0.92, 3.8, 0, Math.PI * 2);
  c.fillStyle = 'white';
  c.fill();
  c.beginPath();
  c.arc(s * 0.1, -s * 0.92, 2.1, 0, Math.PI * 2);
  c.fillStyle = '#222';
  c.fill();

  c.restore();
  if (foundFlag) drawFoundRing(c, x, y - s * 0.3, s + 14, t);
}

// Dispatch by creature id
function drawCreatureAt(id, c, x, y, t, foundFlag) {
  switch (id) {
    case 'clownfish': drawClownfish(c, x, y, t, foundFlag); break;
    case 'octopus':   drawOctopus(c, x, y, t, foundFlag);   break;
    case 'chest':     drawChest(c, x, y, t, foundFlag);     break;
    case 'starfish':  drawStarfish(c, x, y, t, foundFlag);  break;
    case 'crab':      drawCrab(c, x, y, t, foundFlag);      break;
    case 'seahorse':  drawSeahorse(c, x, y, t, foundFlag);  break;
  }
}

// Draw static thumbnail onto a <canvas> element.
// The same draw functions are used here, so thumbnail always matches the game.
function drawThumbnail(id, thumbCanvas) {
  const tc      = thumbCanvas.getContext('2d');
  const size    = thumbCanvas.width;
  const cfg     = THUMB_CFG[id] || { s: 0.8, dy: 0 };
  const ratio   = size / 44;  // scale proportionally for 44 vs 64 base
  tc.clearRect(0, 0, size, size);
  tc.save();
  tc.translate(size / 2, size / 2 + cfg.dy * ratio);
  tc.scale(cfg.s * ratio, cfg.s * ratio);
  drawCreatureAt(id, tc, 0, 0, 0, false);
  tc.restore();
}

// ─────────────────────────────────────────────
//  FEEDBACK / RIPPLE DRAW
// ─────────────────────────────────────────────
function drawFeedbacks() {
  for (let i = feedbacks.length - 1; i >= 0; i--) {
    const f   = feedbacks[i];
    const prg = 1 - f.life / f.maxLife;
    ctx.save();
    ctx.globalAlpha  = 1 - prg;
    ctx.font         = `bold ${f.size || 28}px Arial, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle  = 'rgba(0,0,0,0.75)';
    ctx.lineWidth    = 3.5;
    ctx.strokeText(f.text, f.x, f.y - prg * 65);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y - prg * 65);
    ctx.restore();
    f.life--;
    if (f.life <= 0) feedbacks.splice(i, 1);
  }
}

function drawRipples() {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    const p = 1 - r.life / r.maxLife;
    ctx.save();
    ctx.globalAlpha = (1 - p) * 0.55;
    ctx.strokeStyle = 'rgba(255, 80, 80, 0.9)';
    ctx.lineWidth   = 1.8;
    ctx.beginPath();
    ctx.arc(r.x, r.y, p * 34, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    r.life--;
    if (r.life <= 0) ripples.splice(i, 1);
  }
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update() {
  for (const f of distFish) {
    f.x += f.speed;
    if (f.x > W + 55) { f.x = -55; f.y = rnd(WATER_Y + 30, SAND_Y - 45); }
    if (f.x < -55)    { f.x = W + 55; f.y = rnd(WATER_Y + 30, SAND_Y - 45); }
  }
  for (let i = 0; i < bubbles.length; i++) {
    const b = bubbles[i];
    b.y -= b.spd;
    b.x += b.drift;
    if (b.y < WATER_Y + 5 || b.x < -5 || b.x > W + 5) {
      bubbles[i] = makeBubble();
      bubbles[i].y = SAND_Y - rnd(5, 25);
    }
  }
  for (const jf of jellyfish) {
    jf.x += jf.driftSpd;
    if (jf.x > W + 55) jf.x = -55;
    if (jf.x < -55)    jf.x = W + 55;
  }
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  for (const r of rocks)     drawRock(r);
  for (const sw of seaweeds) drawSeaweed(sw);
  for (const jf of jellyfish) drawJellyfish(jf);
  for (const f of distFish)  drawFish(f);

  const t = performance.now() * 0.001;

  // Draw targets in depth order: sand first, then bottom, then water
  for (const zone of ['sand', 'bottom', 'water']) {
    for (const gt of gameTargets) {
      if (gt.zone === zone) {
        drawCreatureAt(gt.id, ctx, gt.x, gt.y, t, gt.found);
      }
    }
  }

  for (const b of bubbles) drawBubble(b);
  drawRipples();
  drawFeedbacks();
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function gameLoop() {
  if (gameActive) update();
  render();
  requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────────────
//  UI BUILDERS
// ─────────────────────────────────────────────
function buildHUD() {
  const panel = document.getElementById('target-panel');
  panel.innerHTML = '';
  for (let i = 0; i < gameTargets.length; i++) {
    const gt = gameTargets[i];

    const card = document.createElement('div');
    card.className = 'target-card';
    card.id        = 'card-' + i;

    const thumbC = document.createElement('canvas');
    thumbC.className = 'card-thumb';
    thumbC.width     = 44;
    thumbC.height    = 44;

    const nameDiv = document.createElement('div');
    nameDiv.className   = 'card-name';
    nameDiv.textContent = gt.name;

    const ptsDiv = document.createElement('div');
    ptsDiv.className   = 'card-pts';
    ptsDiv.textContent = `+${gt.pts}点`;

    const diffDiv = document.createElement('div');
    diffDiv.className   = 'card-diff';
    diffDiv.textContent = gt.diff;

    card.appendChild(thumbC);
    card.appendChild(nameDiv);
    card.appendChild(ptsDiv);
    card.appendChild(diffDiv);
    panel.appendChild(card);

    drawThumbnail(gt.id, thumbC);
  }
}

function buildStartPreview() {
  const preview = document.getElementById('start-preview');
  preview.innerHTML = '';
  for (const gt of gameTargets) {
    const item = document.createElement('div');
    item.className = 'preview-item';

    const thumbC = document.createElement('canvas');
    thumbC.className = 'big-thumb';
    thumbC.width     = 64;
    thumbC.height    = 64;

    const nameDiv = document.createElement('div');
    nameDiv.className   = 'p-name';
    nameDiv.textContent = gt.name;

    const ptsDiv = document.createElement('div');
    ptsDiv.className   = 'p-pts';
    ptsDiv.textContent = gt.pts + '点';

    const diffDiv = document.createElement('div');
    diffDiv.className   = 'p-diff';
    diffDiv.textContent = gt.diff;

    item.appendChild(thumbC);
    item.appendChild(nameDiv);
    item.appendChild(ptsDiv);
    item.appendChild(diffDiv);
    preview.appendChild(item);

    drawThumbnail(gt.id, thumbC);
  }
}

// ─────────────────────────────────────────────
//  GAME CONTROL
// ─────────────────────────────────────────────

// Pick new random targets and show the start overlay
function showStartOverlay() {
  gameActive = false;
  if (timerInterval) clearInterval(timerInterval);

  gameTargets = pickRandom3().map(c => ({ ...c, found: false, x: 0, y: 0 }));
  buildHUD();
  buildStartPreview();

  document.getElementById('start-overlay').classList.remove('hidden');
  document.getElementById('end-overlay').classList.add('hidden');
}

// Start playing with the currently selected targets
function startGame() {
  score     = 0;
  timeLeft  = 60;
  feedbacks = [];
  ripples   = [];

  for (let i = 0; i < gameTargets.length; i++) {
    gameTargets[i].found = false;
    const card = document.getElementById('card-' + i);
    if (card) card.classList.remove('found');
  }

  updateScoreUI();
  updateTimerUI();
  initScene();

  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('end-overlay').classList.add('hidden');

  gameActive = true;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  gameActive = false;
  if (timerInterval) clearInterval(timerInterval);

  const allFound = gameTargets.every(gt => gt.found);
  document.getElementById('end-title').textContent =
    allFound ? '全部見つけた！🎉' : 'タイムアップ！⏰';

  document.getElementById('result-score').textContent = score + '点';

  const bd = document.getElementById('result-breakdown');
  bd.innerHTML = '';
  for (const gt of gameTargets) {
    const div = document.createElement('div');
    div.className = 'result-row ' + (gt.found ? 'found-yes' : 'found-no');
    div.textContent = gt.found
      ? `${gt.name}：+${gt.pts}点 ✓`
      : `${gt.name}：見つからなかった…`;
    bd.appendChild(div);
  }

  document.getElementById('end-overlay').classList.remove('hidden');
}

function updateScoreUI() {
  document.getElementById('score-val').textContent = score;
}
function updateTimerUI() {
  const el = document.getElementById('timer-val');
  el.textContent = timeLeft;
  el.className   = timeLeft <= 10 ? 'urgent' : '';
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function canvasPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  let cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX;
    cy = e.touches[0].clientY;
  } else {
    cx = e.clientX;
    cy = e.clientY;
  }
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

function handleInput(e) {
  e.preventDefault();
  if (!gameActive) return;

  const { x, y } = canvasPos(e);
  let hit = false;

  for (let i = 0; i < gameTargets.length; i++) {
    const gt = gameTargets[i];
    if (gt.found) continue;

    const d2 = dist2(x, y, gt.x, gt.y);
    if (d2 < (gt.hitR + 8) ** 2) {
      gt.found = true;
      score += gt.pts;
      updateScoreUI();
      document.getElementById('card-' + i).classList.add('found');
      const col = gt.pts >= 45 ? '#ffd700' : gt.pts >= 30 ? '#ffbb00' : '#00ffaa';
      feedbacks.push({
        x: gt.x, y: gt.y - 28,
        text: `+${gt.pts}点！`,
        color: col,
        life: 90, maxLife: 90,
        size: 26 + Math.floor(gt.pts / 5)
      });
      hit = true;
      checkAllFound();
      break;
    }
  }

  if (!hit) {
    ripples.push({ x, y, life: 28, maxLife: 28 });
  }
}

function checkAllFound() {
  if (gameTargets.every(gt => gt.found)) {
    setTimeout(endGame, 900);
  }
}

canvas.addEventListener('click',      handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
showStartOverlay();   // picks initial 3 targets and shows preview
initScene();
requestAnimationFrame(gameLoop);
</script>
